<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookinseats</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <h1 id="movieTitle">Select Your Seats</h1>
    <div class="seat-legend-row">
        <span class="legend unbooked"></span>Unbooked
    </div>
    <div>
        <span class="legend selected"></span>Selected
    </div>
    <div>
        <span class="legend booked"></span>Booked
    </div>
    </div>

    <div class="screen"></div>
    <div class="seat-container" id="seatContainer"></div>
    <p>Selected: <span id="count">0</span> | Total: <span id="total">0</span></p>
    <button onclick="bookSeats()">Book Now</button>

    <div id="confirmationModal" class="modal">
        <div class="modal-content ticket-content" id="ticketArea">
            <h2>Booking Confirmed</h2>
            <img src="" alt="poster" id="confirmPoster" class="ticket-poster">
            <h3 id="confirmTitle"></h3>

            <div class="dotter-line">Scan QR code at theatre</div>
            <div class="booking-info">
                <div class="booking-datails">
                    <p><strong>Date:</strong><span id="confirmDate"></span></p>
                    <p><strong>Time:</strong><span id="confirmTime"></span></p>
                    <p><strong>Theatre:</strong><span id="confirmTheatre"></span></p>
                    <p><strong>Seats:</strong><span id="confirmSeats"></span></p>
                    <p><strong>Booking ID:</strong><span id="bookingId"></span></p>

                </div>
                <div id="qrcode"></div>
            </div>
        </div>
        <button onclick="downloadTicketAsImage()" class="downloadBtn">Download Ticket</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
        integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>


    <script>
        const movie = JSON.parse(localStorage.getItem("selectedMovie"));

        const seatContainer = document.getElementById("seatContainer");
        const movieTitle = document.getElementById("movieTitle");
        const countSpan = document.getElementById("count");
        const totalSpan = document.getElementById("total");

        const ticketPrice = 150;
        const bookedSeats = [2, 5, 12];
        let selectedSeats = [];

        if (!movie || !localStorage.getItem("loggedInUser")) {
            window.location.href = "index.html";
        }

        if (movieTitle) {
            movieTitle.innerText = `Seats for ${movie.title} on ${movie.date} at ${movie.time} ${movie.theatre}`;
        }

        for (let i = 0; i < 40; i++) {
            const seat = document.createElement("div");
            seat.classList.add("seat");

            if (bookedSeats.includes(i)) {
                seat.classList.add("booked");
            }

            seat.addEventListener("click", () => {
                if (!seat.classList.contains("booked")) {
                    seat.classList.toggle("selected");
                    updateSelection();
                }
            });

            seatContainer.appendChild(seat);
        }

        function updateSelection() {
            selectedSeats = [...document.querySelectorAll(".seat.selected")]
            countSpan.textContent = selectedSeats.length;
            totalSpan.textContent = selectedSeats.length * ticketPrice
        }

        // --- Function: bookSeats ---
        function bookSeats() {
            if (selectedSeats.length === 0) {
                alert("Please select at least one seat.");
                return;
            }

            const seatIndexes = selectedSeats.map(seat =>
                Array.from(seatContainer.children).indexOf(seat)
            );

            const seatNames = seatIndexes.map(index => {
                const row = String.fromCharCode(65 + Math.floor(index / 8));
                const col = (index % 8) + 1;
                return row + col;
            });

            const bookingId = "BK" + Math.random().toString(36).substring(2, 10).toUpperCase();

            const booking = {
                movie: movie.title,
                date: movie.date,
                time: movie.time,
                theatre: movie.theatre,
                poster: movie.poster,
                seats: seatNames,
                user: localStorage.getItem("loggedInUser"),
                bookedAt: new Date().toISOString(),
                bookingId
            };

            const allBookings = JSON.parse(localStorage.getItem("bookings") || "[]");
            allBookings.push(booking);
            localStorage.setItem("bookings", JSON.stringify(allBookings));

            selectedSeats.forEach(seat => {
                seat.classList.remove("selected");
                seat.classList.add("booked");
            });

            updateSelection();
            showConfirmationModal(booking);
        }

        // --- Function: showConfirmationModal ---
        function showConfirmationModal(booking) {
            document.getElementById("confirmTitle").innerText = booking.movie;
            document.getElementById("confirmPoster").src = booking.poster;
            document.getElementById("confirmDate").innerText = booking.date;
            document.getElementById("confirmTime").innerText = booking.time;
            document.getElementById("confirmTheatre").innerText = booking.theatre;
            document.getElementById("confirmSeats").innerText = booking.seats.join(", ");
            document.getElementById("bookingId").innerText = booking.bookingId;

            generateQRCode(booking);

            document.getElementById("confirmationModal").style.display = "block";
        }

        // --- Function: generateQRCode ---
        function generateQRCode(booking) {
            const qrData = `
Movie: ${booking.movie}
Time: ${booking.time}
Seats: ${booking.seats.join(", ")}
User: ${booking.user}
    `;

            const qrDiv = document.getElementById("qrcode");
            qrDiv.innerHTML = "";
            new QRCode(qrDiv, {
                text: qrData,
                width: 200,
                height: 200
            });
        }

        // --- Function: downloadTicketAsImage ---
        let isDownloading = false;

        function downloadTicketAsImage() {
            if (isDownloading) return;
            isDownloading = true;

            const ticket = document.getElementById("ticketArea");
            const img = document.getElementById("confirmPoster");
            const originalSrc = img.src;

            convertImageToBase64(originalSrc).then(base64 => {
                const tempImage = new Image();
                tempImage.src = base64;

                tempImage.onload = () => {
                    img.src = base64;

                    html2canvas(ticket, {
                        scale: 2,
                        useCORS: true,
                        allowTaint: true
                    }).then(canvas => {
                        const link = document.createElement("a");
                        link.download = "movie-ticket.png";
                        link.href = canvas.toDataURL("image/png");
                        link.click();

                        img.src = originalSrc;
                        isDownloading = false;

                        // Reset flag and redirect
                        setTimeout(() => {
                            document.getElementById("confirmationModal").style.display = "none";
                            window.location.href = "index.html";
                        }, 1000);
                    });
                };

                tempImage.onerror = () => {
                    alert("Poster image failed to load.");
                    isDownloading = false;
                };
            }).catch(err => {
                alert("Failed to convert poster image for download");
            });
        }

        function convertImageToBase64(imageURL) {
            return new Promise((resolve, reject) => {
                const encodedUrl = encodeURIComponent(imageURL);
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodedUrl}`;

                fetch(proxyUrl)
                    .then(response => {
                        if (!response.ok) throw new Error("Proxy Failed");
                        return response.blob();
                    })
                    .then(blob => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(blob);
                    })
                    .catch(err => {
                        console.error("Image conversion failed", err);
                        reject("Failed to convert image to base64");
                    });
            });
        }
    </script>
</body>

</html>
