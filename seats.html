<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Seat Booking</title>

    <!-- html-to-image -->
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>

    <!-- QR CODE -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <link rel="stylesheet" href="./style.css">
    <style>
        /* Main Button */
        button {
            margin-top: 22px;
            border: none;
            outline: none;
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color: white;
            padding: 10px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 25px rgba(249, 115, 22, 0.35);
        }

        button:hover {
            transform: translateY(-3px);
        }
    </style>
</head>

<body>

    <h1 id="movieTitle">Select Your Seats</h1>

    <div class="screen"></div>

    <div class="seat-container" id="seatContainer"></div>

    <p style="margin-top:20px;">
        Selected:
        <span id="count">0</span>
        |
        Total:
        ₹<span id="total">0</span>
    </p>

    <button onclick="bookSeats()">
        Book Now
    </button>

    <!-- MODAL -->
    <div class="modal" id="confirmationModal">

        <div class="ticket-content" id="ticketArea">

            <h2>Booking Confirmed</h2>

            <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1200&auto=format&fit=crop"
                id="confirmPoster" class="ticket-poster" crossorigin="anonymous">

            <h3 id="confirmTitle">
                Avengers Endgame
            </h3>

            <div class="booking-info">

                <p>
                    <strong>Date:</strong>
                    <span id="confirmDate"></span>
                </p>

                <p>
                    <strong>Time:</strong>
                    <span id="confirmTime"></span>
                </p>

                <p>
                    <strong>Theatre:</strong>
                    <span id="confirmTheatre"></span>
                </p>

                <p>
                    <strong>Seats:</strong>
                    <span id="confirmSeats"></span>
                </p>

                <p>
                    <strong>Booking ID:</strong>
                    <span id="bookingId"></span>
                </p>

            </div>

            <div id="qrBox">
                <div id="qrcode"></div>
            </div>

            <button class="downloadBtn" onclick="downloadTicketAsImage()">
                Download Ticket
            </button>

        </div>

    </div>

    <script>

        const seatContainer =
            document.getElementById("seatContainer");

        const countSpan =
            document.getElementById("count");

        const totalSpan =
            document.getElementById("total");


        const ticketPrice = 150;

        let selectedSeats = [];

        let bookedSeats = [2, 5, 12, 20];

        // Create seats
        for (let i = 0; i < 40; i++) {

            const seat = document.createElement("div");

            seat.classList.add("seat");

            const row =
                String.fromCharCode(65 + Math.floor(i / 8));

            const col = (i % 8) + 1;

            seat.textContent = row + col;

            if (bookedSeats.includes(i)) {
                seat.classList.add("booked");
            }

            seat.addEventListener("click", () => {

                if (!seat.classList.contains("booked")) {

                    seat.classList.toggle("selected");

                    updateSelection();
                }

            });

            seatContainer.appendChild(seat);
        }

        // Update Selection
        function updateSelection() {

            selectedSeats =
                [...document.querySelectorAll(".seat.selected")];

            countSpan.textContent =
                selectedSeats.length;

            totalSpan.textContent =
                selectedSeats.length * ticketPrice;
        }

        // Book Seats
        function bookSeats() {

            if (selectedSeats.length === 0) {

                alert("Please select seats");

                return;
            }

            const seatIndexes = selectedSeats.map(seat =>
                Array.from(seatContainer.children).indexOf(seat)
            );

            const seatNames = seatIndexes.map(index => {

                const row =
                    String.fromCharCode(65 + Math.floor(index / 8));

                const col = (index % 8) + 1;

                return row + col;
            });

            const bookingId =
                "BK" +
                Math.random()
                    .toString(36)
                    .substring(2, 10)
                    .toUpperCase();

            // Fill ticket data
            document.getElementById("confirmDate").innerText =
                "15 May 2026";

            document.getElementById("confirmTime").innerText =
                "7:30 PM";

            document.getElementById("confirmTheatre").innerText =
                "PVR Cinemas";

            document.getElementById("confirmSeats").innerText =
                seatNames.join(", ");

            document.getElementById("bookingId").innerText =
                bookingId;

            // QR CODE
            const qrDiv =
                document.getElementById("qrcode");

            qrDiv.innerHTML = "";

            new QRCode(qrDiv, {

                text:
                    "Movie Ticket\n" +
                    "Seats: " + seatNames.join(", ") +
                    "\nBooking ID: " + bookingId,

                width: 180,
                height: 180
            });

            // Show modal
            document.getElementById(
                "confirmationModal"
            ).style.display = "flex";
        }

        // DOWNLOAD IMAGE
        let isDownloading = false;

        async function downloadTicketAsImage() {

            if (isDownloading) return;

            isDownloading = true;

            const ticket =
                document.getElementById("ticketArea");

            try {

                // Wait for images
                const images =
                    ticket.querySelectorAll("img");

                await Promise.all(
                    [...images].map(img => {

                        if (img.complete)
                            return Promise.resolve();

                        return new Promise(resolve => {

                            img.onload = resolve;
                            img.onerror = resolve;
                        });
                    })
                );

                // Wait QR render
                await new Promise(resolve =>
                    setTimeout(resolve, 800)
                );

                // Generate PNG
                const dataUrl =
                    await htmlToImage.toPng(ticket, {

                        cacheBust: true,

                        pixelRatio: 3,

                        backgroundColor: "#ffffff"
                    });

                // Download
                const link =
                    document.createElement("a");

                link.download =
                    "movie-ticket.png";

                link.href =
                    dataUrl;

                link.click();

                isDownloading = false;

            } catch (error) {

                console.error(error);

                alert("Download Failed");

                isDownloading = false;
            }
        }

    </script>

</body>

</html>
