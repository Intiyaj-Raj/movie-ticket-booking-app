<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .heading {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .heading h1 {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 1px;
            width: 80%;
        }

        #logoutBtn {
            border: none;
            outline: none;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            padding: 10px 22px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(255, 75, 43, 0.35);
        }

        #logoutBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 75, 43, 0.5);
        }

        #logoutBtn:active {
            transform: scale(0.96);
        }

        @media (max-width:600px) {
            .heading {
                flex-direction: column;
                padding: 20px 0;
            }

            #logoutBtn {
                margin-top: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="heading">
        <h1>Select a Moive</h1>
        <p id="logoutBtn" onclick="logoutUser()">
            Logout
        </p>
    </div>

    <div id="movieContainer" class="movie-container">
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <a href="./booking-history.html" class="history-link">View Booking history</a>
    </div>


    <div class="modal" id="ShowtimeModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="selectedMovieName"></h2>
            <div class="date-selector" id="dateSelector"></div>
            <div class="theatre-list" id="theatreList"></div>
        </div>
    </div>
    <script>

        if (!localStorage.getItem("loggedInUser")) {
            window.location.href = "./auth.html";
        }
        // ================= LOGOUT =================

        function logoutUser() {

            localStorage.removeItem("loggedInUser");

            alert("Logged out successfully");

            window.location.href = "index.html";
        }

        const apiKey = 'cafac518041f5c7e643f4d5195ca4891';

        let container = document.getElementById("movieContainer")

        let modal = document.getElementById("ShowtimeModal")

        let selectedMovieName = document.getElementById("selectedMovieName")

        let dateSelector = document.getElementById("dateSelector")

        let theatreList = document.getElementById("theatreList")

        let selectedMovie = null;
        let selectedDate = null;

        const theatres = [
            { name: "INOX", times: ["10:00 AM", "1:00 PM", "4:00 PM"] },
            { name: "PVR Cinemas", times: ["09:00 AM", "12:00 PM", "6:00 PM"] },
            { name: "Miraj Cinemas", times: ["10:30 AM", "2:00 PM", "7:00 PM"] },
            { name: "Mangal Multiplex", times: ["11:00 AM", "3:00 PM", "8:00 PM"] },
            { name: "Carnival Cinemas", times: ["09:30 AM", "1:30 PM", "6:30 PM"] }
        ];

        function renderMovies(movies) {
            container.innerHTML = '';
            movies.forEach((movie) => {
                let card = document.createElement("div")
                card.className = `movie-card`;
                card.innerHTML = `<img src="${movie.poster}" alt="${movie.title}"> <h3>${movie.title}</h3> `;
                card.addEventListener("click", () => openModal(movie));
                container.appendChild(card);
            });
        }

        // Fetch popular movies from TMDB API
        fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${apiKey}&language=en-US&page=1`)
            .then(response => response.json())
            .then(data => {
                const movies = data.results.map(movie => ({
                    title: movie.title,
                    poster: `https://image.tmdb.org/t/p/w500${movie.poster_path}`
                }));
                renderMovies(movies);
            })
            .catch(error => {
                console.error("Error fetching movies from TMDB:", error);
                container.innerHTML = "<p>Failed to load movies. Please try again later.</p>";
            });

        function openModal(movie) {
            selectedMovie = movie;
            selectedMovieName.textContent = movie.title;
            modal.style.display = "block";
            renderDates();
            renderTheatres();
        }

        function closeModal() {
            modal.style.display = "none"
        }

        function renderDates() {
            let today = new Date();
            dateSelector.innerHTML = ""
            for (let i = 0; i < 5; i++) {
                const d = new Date(today)
                d.setDate(d.getDate() + i);
                let div = document.createElement("div");
                div.className = "date-item";
                div.textContent = d.toDateString().slice(4, 10)
                if (i === 0) {
                    div.classList.add("selected")
                    selectedDate = d.toDateString()
                }

                div.addEventListener("click", () => {
                    document.querySelectorAll(".date-item").forEach(el => el.classList.remove("selected"));
                    div.classList.add("selected");
                    selectedDate = d.toDateString();
                });
                dateSelector.appendChild(div);
            }
        }
        function renderTheatres() {
            theatreList.innerHTML = "";

            theatres.forEach((theatre) => {
                const div = document.createElement("div");
                div.className = "theatre-block";
                div.innerHTML = `<h4>${theatre.name}</h4>`;

                theatre.times.forEach((time) => {
                    const btn = document.createElement("button");
                    btn.className = "time-btn";
                    btn.textContent = time;

                    btn.addEventListener("click", () => {
                        localStorage.setItem("selectedMovie", JSON.stringify({
                            ...selectedMovie,
                            date: selectedDate,
                            theatre: theatre.name,
                            time: time
                        }));

                        window.location.href = "seats.html";
                    });

                    div.appendChild(btn);
                });

                theatreList.appendChild(div);
            });
        }

    </script>
</body>

</html>
