<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie App Auth</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .signUpContainer {
            display: none;
        }
    </style>

</head>

<body>

    <div class="login-container">
        <h2>Book MY Show</h2>

        <div id="loginBox">
            <input type="text" id="loginUsername" placeholder="username or email">
            <input type="password" id="loginPassword" placeholder="password">

            <button onclick="showSignup()">Sign up</button>
            <button onclick="login()">Login</button>
            <p style="margin-top: 10px; cursor: pointer; color: #03dac5;" onclick="showForgotPassword()">Forgot
                Password?</p>
        </div>


        <!-- sign up page -->
        <div class="signUpContainer" id="signupBox">
            <input type="text" id="signupUsername" placeholder="enter your email">
            <input type="password" id="signupPassword" placeholder="password">
            <input type="tel" id="usermob" placeholder="mobile number">
            <input type="text" name="" id="otp" placeholder="Enter Your Otp">
            <button onclick="sendOtp()">Send OTP</button>
            <button onclick="signup()">Create Account</button>
            <p style="margin-top: 10px; cursor: pointer; color: #03dac5;" onclick="showLogin()">Back to Login</p>
        </div>

        <!-- forgot password page -->
        <div class="signUpContainer" id="forgotBox">
            <input type="text" id="forgotEmail" placeholder="enter your registered email">
            <input type="text" id="forgotOtp" placeholder="Enter OTP">
            <input type="password" id="forgotNewPassword" placeholder="enter new password">
            <button onclick="sendForgotOtp()">Send OTP</button>
            <button onclick="resetPassword()">Reset Password</button>
            <p style="margin-top: 10px; cursor: pointer; color: #03dac5;" onclick="showLogin()">Back to Login</p>
        </div>
    </div>



    <!-- <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script> -->

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
